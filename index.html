<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Supabase</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 360px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    background: #0095f6;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

small {
    display: block;
    margin-top: 10px;
    color: gray;
}
</style>
</head>

<body>

<div class="box">
    <h2>Invia dati</h2>

    <input id="user" placeholder="Nome">
    <input id="msg" placeholder="Messaggio">

    <button onclick="send()">Invia</button>

    <small>Supabase test</small>
</div>

<script>

// 🔵 TUO PROJECT URL
const supabaseUrl = "https://kgtpnhvdnjsmimihguqg.supabase.co";

// 🔵 TUA ANON KEY
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndHBuaHZkbmpzbWltaWhndXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTgxNjEsImV4cCI6MjA5MjUzNDE2MX0.py6zxxMaL3tjPl8o4A5RkMX01K_Qd1ve0OQv1mfwJRk";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// FUNZIONE INVIO
async function send() {
    let user = document.getElementById("user").value;
    let msg = document.getElementById("msg").value;

    if (!user || !msg) {
        alert("Compila tutti i campi");
        return;
    }

    let { error } = await supabase
        .from('messages')
        .insert([{ name: user, message: msg }]);

    if (error) {
        console.log(error);
        alert("Errore nel salvataggio");
    } else {
        alert("Dati salvati nel database!");
        document.getElementById("user").value = "";
        document.getElementById("msg").value = "";
    }
}

</script>

</body>
</html>
