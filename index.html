<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.card {
    width: 350px;
    background: #fff;
    border: 1px solid #dbdbdb;
    padding: 40px 40px 25px;
    text-align: center;
}

/* LOGO */
.logo {
    font-family: 'Segoe UI', sans-serif;
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 30px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    background: #fafafa;
    font-size: 12px;
}

/* PASSWORD */
.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 10px;
    font-size: 13px;
    color: #8e8e8e;
    cursor: pointer;
}

/* FORGOT */
.forgot {
    font-size: 12px;
    color: #00376b;
    cursor: pointer;
    text-align: right;
    margin-top: 8px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background: #0095f6;
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0.5;
}

button:hover {
    background: #1877f2;
}

/* OPPURE */
.or {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
    font-size: 12px;
    font-weight: 600;
    color: #8e8e8e;
    gap: 10px;
}

.or::before,
.or::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #dbdbdb;
}

/* SOCIAL LOGIN */
.link {
    font-size: 13px;
    color: #385185;
    cursor: pointer;
    font-weight: 600;
}

/* FOOTER */
.footer {
    margin-top: 25px;
    font-size: 13px;
    color: #262626;
}

.footer span {
    color: #0095f6;
    font-weight: 600;
    cursor: pointer;
}

/* SMALL FOOTER STYLE */
.small {
    margin-top: 15px;
    font-size: 11px;
    color: #8e8e8e;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Instagram</div>

    <input type="text" placeholder="Numero di telefono, username o email">

    <div class="password-box">
        <input type="password" id="password" placeholder="Password">
        <div class="eye" onclick="togglePassword()">👁</div>
    </div>

    <div class="forgot">Password dimenticata?</div>

    <button>Accedi</button>

    <div class="or">OPPURE</div>

    <div class="link">Continua con Facebook</div>

    <div class="footer">
        Non hai un account? <span>Registrati</span>
    </div>

    <div class="small">
        Scarica l’app e accedi più velocemente
    </div>

</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
