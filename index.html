<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso</title>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX CENTRALE */
.card {
    width: 360px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 40px;
    text-align: center;
    border-radius: 10px;
}

/* LOGO TESTO */
.logo {
    font-size: 40px;
    font-weight: bold;
    margin-bottom: 25px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 6px;
    background: #fafafa;
}

/* PASSWORD ICON (solo estetico) */
.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 12px;
    font-size: 14px;
    color: gray;
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4dabf7;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

/* LINEA OR */
.or {
    margin: 15px 0;
    font-size: 12px;
    color: gray;
}

/* LINK */
.link {
    font-size: 12px;
    color: #0095f6;
    cursor: pointer;
    margin-top: 10px;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Accesso</div>

    <input type="text" placeholder="Numero di telefono, username o email">

    <div class="password-box">
        <input type="password" placeholder="Password">
        <div class="eye">👁</div>
    </div>

    <button>Accedi</button>

    <div class="or">——— O ———</div>

    <div class="link">Continua con un account social</div>

    <div class="footer">
        Non hai un account? <span style="color:#0095f6;cursor:pointer;">Iscriviti</span>
    </div>

</div>

</body>
</html>
