<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso</title>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX PIÙ ALTO (RETTANGOLO VERTICALE) */
.card {
    width: 360px;
    min-height: 520px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 50px 40px;
    text-align: center;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* LOGO */
.logo {
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 30px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 6px;
    background: #fafafa;
}

/* PASSWORD BOX */
.password-box {
    position: relative;
}

/* OCCHIO */
.eye {
    position: absolute;
    right: 10px;
    top: 12px;
    font-size: 14px;
    color: gray;
    cursor: pointer;
}

/* PASSWORD DIMENTICATA */
.forgot {
    font-size: 12px;
    color: #0095f6;
    cursor: pointer;
    margin-top: 6px;
    text-align: right;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4dabf7;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

/* OPPURE */
.or {
    margin: 20px 0;
    font-size: 12px;
    color: gray;
    letter-spacing: 1px;
}

/* LINK */
.link {
    font-size: 12px;
    color: #0095f6;
    cursor: pointer;
    margin-top: 10px;
}

.footer {
    margin-top: 25px;
    font-size: 12px;
    color: gray;
}
.footer span {
    color: #0095f6;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Instagram</div>

    <input type="text" placeholder="Numero di telefono, username o email">

    <div class="password-box">
        <input type="password" id="password" placeholder="Password">
        <div class="eye" onclick="togglePassword()">👁</div>
    </div>

    <div class="forgot">Password dimenticata?</div>

    <button>Accedi</button>

    <div class="or">OPPURE</div>

    <div class="link">Continua con un account social</div>

    <div class="footer">
        Non hai un account? <span>Registrati</span>
    </div>

</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
