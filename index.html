<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Demo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    background: white;
    border: 1px solid #ddd;
    padding: 40px;
    text-align: center;
    border-radius: 10px;
}

.title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 25px;
    font-family: Arial;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4dabf7;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

.small {
    margin-top: 10px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Login</div>

    <input id="user" placeholder="Username">
    <input id="msg" placeholder="Password">

    <button onclick="send()">Accedi</button>

    <div class="small">Demo interface</div>
</div>

<script>

// 🔵 SUPABASE
const supabaseUrl = "https://kgtpnhvdnjsmimihguqg.supabase.co";

const supabaseKey = "INCOLLA_LA_TUA_ANON_KEY";

const supabase = supabase?.createClient
    ? supabase.createClient(supabaseUrl, supabaseKey)
    : window.supabase.createClient(supabaseUrl, supabaseKey);

// INVIO
async function send() {
    const user = document.getElementById("user").value;
    const msg = document.getElementById("msg").value;

    if (!user || !msg) {
        alert("Compila tutti i campi");
        return;
    }

    const { error } = await supabase
        .from('messages')
        .insert([{ name: user, message: msg }]);

    if (error) {
        console.log(error);
        alert("Errore nel database");
    } else {
        alert("Salvato!");
    }
}

</script>

</body>
</html>
