<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accedi</title>

<style>
body {
    margin: 0;
    background: #fafafa;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
}

.container {
    width: 360px;
}

.box {
    background: white;
    border: 1px solid #dbdbdb;
    padding: 40px;
    text-align: center;
}

.logo {
    font-size: 40px;
    margin-bottom: 20px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 6px;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4dabf7;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

/* ADMIN PANEL */
.admin {
    width: 360px;
    margin-top: 20px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 15px;
    display: none;
}

.admin h3 {
    margin: 0 0 10px 0;
}

li {
    font-size: 14px;
    margin-bottom: 5px;
}

/* ICONA INFO */
.info {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LOGIN -->
    <div class="container">

        <div class="box">
            <div class="logo">Instagram</div>

            <input id="user" type="text" placeholder="Username">
            <input id="pass" type="password" placeholder="Password">

            <button onclick="login()">Accedi</button>
        </div>

    </div>

    <!-- ADMIN PANEL -->
    <div class="admin" id="adminPanel">
        <h3>Log utenti (admin)</h3>
        <ul id="lista"></ul>
    </div>

</div>

<!-- ICONA i -->
<div class="info" onclick="askPassword()">i</div>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    let dati = JSON.parse(localStorage.getItem("logins")) || [];

    dati.push({ user, pass });

    localStorage.setItem("logins", JSON.stringify(dati));

    aggiornaLista();

    alert("Login salvato!");
}

function aggiornaLista() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let dati = JSON.parse(localStorage.getItem("logins")) || [];

    dati.forEach(item => {
        let li = document.createElement("li");
        li.textContent = "User: " + item.user + " | Pass: " + item.pass;
        lista.appendChild(li);
    });
}

function askPassword() {
    let pw = prompt("Inserisci password admin:");

    if (pw === "admin") {
        document.getElementById("adminPanel").style.display = "block";
        aggiornaLista();
    } else {
        alert("Password errata!");
    }
}

window.onload = aggiornaLista;
</script>

</body>
</html>
