<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
    background: #fafafa;
}

.box {
    width: 400px;
    margin: auto;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 20px;
}

li {
    text-align: left;
    font-size: 14px;
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="box">
    <h2>Admin Panel</h2>
    <ul id="lista"></ul>
</div>

<script>
function load() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let dati = JSON.parse(localStorage.getItem("logins")) || [];

    dati.forEach(d => {
        let li = document.createElement("li");
        li.textContent = d.user + " | " + d.pass;
        lista.appendChild(li);
    });
}

load();
</script>

</body>
</html>
